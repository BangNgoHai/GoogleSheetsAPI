<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Job Application Collector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="container">
        <h1>Job Application Collector</h1>
        <p class="subtitle">
            Information eingeben und Lebenslauf hochladen, um sich für die Stelle zu bewerben.
        </p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="message-box">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Vollständiger Name</label>
                <input type="text" name="full_name" placeholder="Nguyễn Văn A" required>
            </div>

            <div class="form-group">
                <label>Alter</label>
                <input type="number" name="age" placeholder="22" required>
            </div>

            <div class="form-group">
                <label>Telefonenummer</label>
                <input type="text" name="phone" placeholder="0901234567" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label>gewünschte Position</label>
                <input type="text" name="desired_position" placeholder="Python Developer Intern" required>
            </div>

            <div class="form-group">
                <label>hochladen CV PDF</label>
                <input type="file" name="cv_file" accept="application/pdf" required>
            </div>

            <button type="submit">Senden</button>
        </form>
    </div>

</body>
</html>
