<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Job Application Collector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="container">
        <h1>Job Application Collector</h1>
        <p class="subtitle">
            Enter your information and upload your CV to apply for the position.
        </p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="message-box">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('index') }}" enctype="multipart/form-data">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Eugene Slege" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="22" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="0901234567" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label>Desired Position</label>
                <input type="text" name="desired_position" placeholder="Python Developer Intern" required>
            </div>

            <div class="form-group">
                <label>Upload CV (PDF)</label>
                <input type="file" name="cv_file" accept="application/pdf" required>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
